[paths]
vdif_file = /home/lyb/lyb_workspace/antenna_data/VDIF/HP/p51224_hp.vdif
data_format = vdif

[observation]
sample_rate = 64*u.MHz
telescope = HP40m
source_name = B0531+21
dm_source = 56.79

# Start time in seconds (0 = start from beginning)
t_start = 0

# Reference time for Mark5B format (required when data_format=mark5b)
ref_time = 2025-12-23T17:05:00.0

# NEW: File number to start from (for resuming)
# Set to 5110 to resume after the 5110 files you've already created
start_file = 0

[output]
max_subints_per_file = 32
max_files = 999999
version = 0

[frequency]
# Overall center for 6 subbands
center_freq = 2264.00
subbands = 0,1,2,3
USB = U,U,U,U
mask_sband = 1,1,1,1
subband_width = 32.0
withsubband = True

# Number of channels for Mark5B format (default: 1)
nchan = 4

# Define center frequencies for each subband with gaps
subband_centers = 2216.00, 2248.00, 2280.00, 2312.00

[processing]
nchans = 128
chunk_size = 1048576
reduction_factor = 256
calib_bandpass = False
flag_band_edge = 2



[dm_correction]
# DM value is taken from [observation] dm_source

# Reference frequency in MHz; leave empty to use center_freq from [frequency]
ref_freq =

[detection]
# Amplitude SNR threshold for initial peak detection
amp_snr_threshold = 4.0
# Flux SNR threshold for final pulse selection after Gaussian fitting
flux_snr_threshold = 3.5
# Minimum distance between peaks in samples (to handle pulse shoulders/artifacts)
peak_distance = 5000
# Sigma for frequency-domain RFI removal
sigma_remove_rfi_frequency = 5
# Sigma for time-frequency domain RFI removal
sigma_remove_rfi_time_frequency = 9

[detection_manual_mask]
# Manual frequency mask ranges in MHz
# Format: freq_start,freq_end per line. Leave empty to disable.
# Example:
# freq_mask_ranges = 2200,2210
#                    2280,2290
freq_mask_ranges =


[integrated_output]
# CSV output path (base name, timestamp will be appended)
csv_output_path = /home/lyb/lyb_workspace/result_integrated_pipeline/p51224_hp/pulse_csv_results
# Directory for original PSRFITS files containing detected pulses
output_raw_psrfits_dir = /home/lyb/lyb_workspace/result_integrated_pipeline/p51224_hp/pulse_psrfits_raw
# Directory for DM-corrected PSRFITS files containing detected pulses
output_corrected_psrfits_dir = /home/lyb/lyb_workspace/result_integrated_pipeline/p51224_hp/pulse_psrfits_corrected
# Directory for pulse waterfall plot images (leave empty to disable)
plot_output_dir = /home/lyb/lyb_workspace/result_integrated_pipeline/p51224_hp/pulse_plots