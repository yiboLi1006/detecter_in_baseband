[paths]
# VDIF / Mark5B input file path
vdif_file = /home/lyb/lyb_workspace/antenna_data/VDIF/p51015_km_no0009.vdif
data_format = vdif

[observation]
sample_rate = 32*u.MHz
telescope = KM40m
source_name = B0531+21
dm_source = 56.79

t_start = 10

# Reference time for Mark5B format (required when data_format=mark5b)
ref_time = 2025-12-23T17:05:00.0

# File number to start from (for resuming)
start_file = 0

[output]
max_subints_per_file = 32
max_files = 999999
version = 0

[frequency]
# Overall center frequency for all subbands
center_freq = 2252.99
subbands = 10,11,12,13,14,15
USB = U,U,U,U,U,U
mask_sband = 1,1,1,1,1,1
subband_width = 16.0
withsubband = True

nchan = 1

# Define center frequencies for each subband (for continuous freq axis with gaps)
subband_centers = 2208.99, 2224.99, 2240.99, 2264.99, 2280.99, 2296.99


[processing]
# Number of frequency channels per subband
nchans = 64
# Chunk size (samples per subint)
chunk_size = 1048576
# Time domain downsampling factor
reduction_factor = 128
# Whether to calibrate bandpass within each subband (B-spline)
calib_bandpass = False
# Number of edge channels to flag per subband
flag_band_edge = 2

[dm_correction]
dm_value = 56.79
# Reference frequency in MHz; leave empty to use center_freq from [frequency]
ref_freq =

[detection]
# Amplitude SNR threshold for initial peak detection
amp_snr_threshold = 4.0
# Flux SNR threshold for final pulse selection after Gaussian fitting
flux_snr_threshold = 3.5
# Minimum distance between peaks in samples (to handle pulse shoulders/artifacts)
peak_distance = 5000
# Sigma for frequency-domain RFI removal
sigma_remove_rfi_frequency = 5
# Sigma for time-frequency domain RFI removal
sigma_remove_rfi_time_frequency = 9

[detection_manual_mask]
# Manual frequency mask ranges in MHz
# Format: freq_start,freq_end per line. Leave empty to disable.
# Example:
# freq_mask_ranges = 2200,2210
#                    2280,2290
freq_mask_ranges =

[integrated_output]
# CSV output path (base name, timestamp will be appended)
csv_output_path = /home/lyb/lyb_workspace/result_integrated_pipeline/p51015_km_no0009/pulse_csv_results
# Directory for original PSRFITS files containing detected pulses
output_raw_psrfits_dir = /home/lyb/lyb_workspace/result_integrated_pipeline/p51015_km_no0009/pulse_psrfits_raw
# Directory for DM-corrected PSRFITS files containing detected pulses
output_corrected_psrfits_dir = /home/lyb/lyb_workspace/result_integrated_pipeline/p51015_km_no0009/pulse_psrfits_corrected
# Directory for pulse waterfall plot images (leave empty to disable)
plot_output_dir = /home/lyb/lyb_workspace/result_integrated_pipeline/p51015_km_no0009/pulse_plots